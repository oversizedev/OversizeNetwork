name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - "*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  generate:
    name: Generate Network
    runs-on: macos-latest
    if:  github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OpenAPI code
        run: swift package plugin --allow-writing-to-package-directory generate-code-from-openapi

      - name: Commit generated sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/OversizeNetwork/GeneratedSources/
          git diff --staged --quiet || git commit -m "chore: regenerate OpenAPI sources"
          git push

  build-swiftpm:
    name: Build SwiftPM
    needs: generate
    uses: oversizedev/GithubWorkflows/.github/workflows/build-swiftpm.yml@main
    with:
      package: "OversizeNetwork"
    secrets: inherit

  bump:
    name: Bump version
    needs: build-swiftpm
    if: github.ref == 'refs/heads/main'
    uses: oversizedev/GithubWorkflows/.github/workflows/bump.yml@main
    secrets: inherit

  release:
    name: Create Release
    if: github.ref != 'refs/heads/main' && startsWith(github.ref, 'refs/tags/')
    uses: oversizedev/GithubWorkflows/.github/workflows/release.yml@main
    secrets: inherit
